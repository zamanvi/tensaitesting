[phases.install]
cmds = ["composer install --no-dev --ignore-platform-reqs --no-scripts --optimize-autoloader"]

[phases.build]
cmds = ["php artisan package:discover --ansi || true"]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
